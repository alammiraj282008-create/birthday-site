<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Surprise</title>
  <style>
    :root{
      --bg:#050508;
      --bg2:#120812;
      --pink:#ff4fa3;
      --pink2:#ff8bc6;
      --text:#ffd7ea;
      --dim:#c58aa8;
      --glow:0 0 18px rgba(255,79,163,.45);
    }

    *{box-sizing:border-box}
    html,body{height:100%; margin:0}
    body{
      background:
        radial-gradient(circle at top, #1a1020 0%, var(--bg) 45%, #000 100%);
      color:var(--text);
      font-family: "Trebuchet MS", Arial, sans-serif;
      overflow:hidden;
    }

    .scene{
      position:relative;
      width:100%;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .stars, .hearts, .paws{
      position:absolute;
      inset:0;
      pointer-events:none;
      overflow:hidden;
    }

    .star, .heart, .paw{
      position:absolute;
      opacity:.9;
      animation: floatUp linear infinite;
      user-select:none;
    }

    .star{
      color:#ff8fd1;
      text-shadow:0 0 8px rgba(255,143,209,.6);
      font-size:14px;
    }

    .heart{
      color:#ff5ea9;
      text-shadow:0 0 10px rgba(255,94,169,.5);
      font-size:18px;
    }

    .paw{
      color:#ff7ab5;
      opacity:.4;
      font-size:16px;
    }

    @keyframes floatUp{
      from{transform:translateY(20px) scale(.9); opacity:0}
      15%{opacity:1}
      to{transform:translateY(-120vh) scale(1.1); opacity:0}
    }

    .card{
      position:relative;
      width:min(980px, 100%);
      min-height:90vh;
      border-radius:30px;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08);
      box-shadow: 0 0 40px rgba(255,79,163,.08);
      backdrop-filter: blur(6px);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:24px;
      text-align:center;
    }

    .title{
      margin:0;
      font-size:clamp(2.2rem, 6vw, 5rem);
      line-height:1.02;
      color:#ffd1e8;
      text-shadow:
        0 0 18px rgba(255,79,163,.55),
        0 2px 0 rgba(255,79,163,.25);
      animation: popIn 1s ease both;
    }

    .subtitle{
      margin-top:14px;
      font-size:clamp(1rem, 2.3vw, 1.15rem);
      color:var(--dim);
      animation: fadeInUp 1.2s ease both;
    }

    .catsRow{
      width:min(900px, 100%);
      margin:26px 0 18px;
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:18px;
      align-items:end;
      justify-items:center;
    }

    .catBlock{
      width:min(320px, 100%);
      aspect-ratio:1/1;
      display:flex;
      align-items:center;
      justify-content:center;
      filter: drop-shadow(0 16px 26px rgba(255,79,163,.18));
      animation: bob 2.4s ease-in-out infinite;
    }

    .catBlock.right{
      animation-duration: 3s;
    }

    canvas.catSprite{
      width:100%;
      height:auto;
      aspect-ratio:1/1;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    @keyframes bob{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-10px)}
    }

    .buttonWrap{
      margin-top:8px;
      animation: fadeInUp 1.7s ease both;
      position:relative;
      z-index:2;
    }

    .btn{
      appearance:none;
      border:none;
      border-radius:999px;
      padding:18px 42px;
      font-size:clamp(1.05rem, 2.5vw, 1.45rem);
      font-weight:800;
      color:#fff;
      background:linear-gradient(180deg, #ff8ac0 0%, #ff4fa3 100%);
      box-shadow:
        0 10px 30px rgba(255,79,163,.38),
        inset 0 1px 0 rgba(255,255,255,.35);
      cursor:pointer;
      animation: glow 1.8s ease-in-out infinite;
      transition:transform .2s ease;
      position:relative;
      overflow:hidden;
    }

    .btn:hover{transform:translateY(-2px) scale(1.02)}
    .btn:active{transform:translateY(1px) scale(.99)}

    .btn::after{
      content:"";
      position:absolute;
      inset:-40%;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.25), transparent);
      transform:rotate(25deg) translateX(-120%);
      animation: sweep 2.6s linear infinite;
    }

    @keyframes sweep{
      to{transform:rotate(25deg) translateX(120%)}
    }

    @keyframes glow{
      0%,100%{box-shadow:0 10px 28px rgba(255,79,163,.34), inset 0 1px 0 rgba(255,255,255,.35)}
      50%{box-shadow:0 14px 36px rgba(255,79,163,.55), inset 0 1px 0 rgba(255,255,255,.45)}
    }

    .hint{
      margin-top:14px;
      color:#c58aa8;
      font-size:clamp(.92rem, 2vw, 1.02rem);
      animation: fadeInUp 2s ease both;
    }

    .pointLabel{
      position:absolute;
      top:10%;
      font-size:clamp(.9rem, 2vw, 1rem);
      color:#ffb2d4;
      text-shadow:0 0 10px rgba(255,79,163,.25);
      animation: pulseText 1.8s ease-in-out infinite;
      white-space:nowrap;
    }

    .leftLabel{left:10%}
    .rightLabel{right:10%}

    .bottomCats{
      position:absolute;
      left:0;
      right:0;
      bottom:8px;
      display:flex;
      justify-content:space-between;
      padding:0 12px;
      pointer-events:none;
      opacity:.95;
    }

    .miniCat{
      width:90px;
      height:90px;
      animation: bob 2.8s ease-in-out infinite;
    }

    .miniCat.right{animation-duration:3.4s}

    .fadeOut{
      animation: fadeOut .7s ease forwards;
    }

    @keyframes popIn{
      from{transform:translateY(18px) scale(.94); opacity:0}
      to{transform:translateY(0) scale(1); opacity:1}
    }

    @keyframes fadeInUp{
      from{transform:translateY(12px); opacity:0}
      to{transform:translateY(0); opacity:1}
    }

    @keyframes fadeOut{
      to{opacity:0; transform:scale(.98)}
    }

    @keyframes pulseText{
      0%,100%{transform:scale(1); opacity:.9}
      50%{transform:scale(1.05); opacity:1}
    }

    @media (max-width: 720px){
      .catsRow{
        grid-template-columns:1fr;
        margin-top:18px;
      }
      .catBlock{max-width:240px}
      .bottomCats{bottom:2px}
      .miniCat{width:66px;height:66px}
      .leftLabel,.rightLabel{
        top:auto;
        bottom:22%;
      }
      .leftLabel{left:6%}
      .rightLabel{right:6%}
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="stars" id="stars"></div>
    <div class="hearts" id="hearts"></div>
    <div class="paws" id="paws"></div>

    <div class="card" id="card">
      <h1 class="title">Happy Birthday<br/>Love</h1>
      <div class="subtitle">Something special is waiting for you...</div>

      <div class="catsRow">
        <div class="catBlock">
          <div class="pointLabel leftLabel">⬇ let's unwrap ur surprise</div>
          <canvas class="catSprite" id="catLeft" width="128" height="128"></canvas>
        </div>
        <div class="catBlock right">
          <div class="pointLabel rightLabel">let's unwrap ur surprise ⬇</div>
          <canvas class="catSprite" id="catRight" width="128" height="128"></canvas>
        </div>
      </div>

      <div class="buttonWrap">
        <button class="btn" id="enterBtn">Let's Unwrap Your Surprise</button>
      </div>

      <div class="hint">Don't open before 12 okay? 😝</div>

      <div class="bottomCats">
        <canvas class="miniCat" id="miniLeft" width="128" height="128"></canvas>
        <canvas class="miniCat right" id="miniRight" width="128" height="128"></canvas>
      </div>
    </div>
  </div>

  <script>
    const starsWrap = document.getElementById("stars");
    const heartsWrap = document.getElementById("hearts");
    const pawsWrap = document.getElementById("paws");
    const card = document.getElementById("card");
    const enterBtn = document.getElementById("enterBtn");

    function makeFloatingParticles(wrap, char, cls, count, minDur, maxDur) {
      for (let i = 0; i < count; i++) {
        const el = document.createElement("div");
        el.className = cls;
        el.textContent = char;
        el.style.left = Math.random() * 100 + "vw";
        el.style.top = (Math.random() * 100 + 10) + "vh";
        el.style.animationDuration = (minDur + Math.random() * (maxDur - minDur)).toFixed(2) + "s";
        el.style.animationDelay = (-Math.random() * maxDur).toFixed(2) + "s";
        el.style.fontSize = (10 + Math.random() * 12).toFixed(0) + "px";
        wrap.appendChild(el);
      }
    }

    makeFloatingParticles(starsWrap, "✦", "star", 26, 8, 14);
    makeFloatingParticles(heartsWrap, "♡", "heart", 18, 7, 13);
    makeFloatingParticles(pawsWrap, "🐾", "paw", 14, 10, 16);

    function drawCat(ctx, state = "idle") {
      const W = ctx.canvas.width;
      const H = ctx.canvas.height;
      ctx.clearRect(0, 0, W, H);
      ctx.imageSmoothingEnabled = false;

      const px = 8; // pixel size
      const scale = 1;

      function rect(x, y, w, h, c) {
        ctx.fillStyle = c;
        ctx.fillRect(x * px, y * px, w * px, h * px);
      }

      function pixelCircle(cx, cy, r, c) {
        ctx.fillStyle = c;
        for (let y = -r; y <= r; y++) {
          for (let x = -r; x <= r; x++) {
            if (x * x + y * y <= r * r) {
              ctx.fillRect((cx + x) * px, (cy + y) * px, px, px);
            }
          }
        }
      }

      const black = "#101015";
      const black2 = "#1a1a22";
      const pink = "#ff79b6";
      const pink2 = "#ff9fcc";
      const white = "#f7eef5";
      const red = "#ff4fa3";

      // shadow
      rect(3, 10, 12, 8, "rgba(255,79,163,.08)");

      // ears
      rect(3, 2, 3, 4, black);
      rect(4, 1, 2, 3, black);
      rect(5, 2, 2, 3, black2);
      rect(9, 2, 3, 4, black);
      rect(9, 1, 2, 3, black2);
      rect(8, 2, 2, 3, black);

      // inner ears
      rect(4, 3, 1, 1, pink);
      rect(10, 3, 1, 1, pink);

      // head
      for (let y = 4; y <= 11; y++) {
        for (let x = 3; x <= 12; x++) {
          if (
            (x >= 4 && x <= 11 && y >= 4 && y <= 11) ||
            (y >= 5 && y <= 10 && x >= 3 && x <= 12)
          ) {
            ctx.fillStyle = black;
            ctx.fillRect(x * px, y * px, px, px);
          }
        }
      }
      // curve highlights
      rect(4, 4, 8, 1, black2);
      rect(3, 6, 1, 4, black2);
      rect(12, 6, 1, 4, black2);

      // eyes
      if (state === "blink") {
        rect(5, 7, 2, 1, pink2);
        rect(9, 7, 2, 1, pink2);
      } else {
        pixelCircle(6, 7, 1, white);
        pixelCircle(10, 7, 1, white);
        pixelCircle(6, 7, 0, "#111");
        pixelCircle(10, 7, 0, "#111");
        rect(6, 7, 1, 1, white);
        rect(10, 7, 1, 1, white);
      }

      // cheeks
      rect(4, 8, 1, 1, pink);
      rect(11, 8, 1, 1, pink);

      // nose
      rect(7, 8, 1, 1, pink2);

      // mouth
      rect(7, 9, 1, 1, red);
      rect(6, 10, 3, 1, black);

      // whiskers
      rect(1, 8, 2, 1, black);
      rect(0, 9, 3, 1, black2);
      rect(13, 8, 2, 1, black);
      rect(13, 9, 3, 1, black2);

      // body
      rect(4, 11, 8, 5, black);
      rect(5, 12, 6, 4, black2);

      // front paws
      rect(4, 14, 2, 3, black);
      rect(10, 14, 2, 3, black);
      rect(4, 16, 2, 1, black2);
      rect(10, 16, 2, 1, black2);

      // tail
      rect(12, 12, 2, 1, black);
      rect(13, 13, 1, 2, black);
      rect(12, 15, 2, 1, black2);

      // heart necklace
      rect(7, 12, 1, 1, red);
      rect(8, 12, 1, 1, pink);
      rect(7, 13, 2, 1, red);

      // pointing paw / arm
      if (state === "point-left") {
        rect(2, 12, 3, 1, black);
        rect(1, 13, 3, 1, black);
        rect(0, 14, 3, 1, black2);
        rect(2, 11, 1, 3, black2);
      } else if (state === "point-right") {
        rect(11, 12, 3, 1, black);
        rect(12, 13, 3, 1, black);
        rect(13, 14, 3, 1, black2);
        rect(13, 11, 1, 3, black2);
      } else {
        rect(2, 12, 2, 1, black);
        rect(1, 13, 2, 1, black2);
        rect(11, 12, 2, 1, black);
        rect(12, 13, 2, 1, black2);
      }

      // glow ring
      ctx.strokeStyle = "rgba(255,79,163,.35)";
      ctx.lineWidth = 2;
      ctx.strokeRect(2 * px, 2 * px, 12 * px, 15 * px);
    }

    function setupCanvas(id, state) {
      const canvas = document.getElementById(id);
      const ctx = canvas.getContext("2d");
      const fit = () => {
        const displaySize = Math.min(canvas.clientWidth, 420);
        canvas.width = 128;
        canvas.height = 128;
        drawCat(ctx, state);
      };
      fit();
      window.addEventListener("resize", fit);
      return { canvas, ctx, state };
    }

    const leftCat = setupCanvas("catLeft", "point-right");
    const rightCat = setupCanvas("catRight", "point-left");
    const miniLeft = setupCanvas("miniLeft", "idle");
    const miniRight = setupCanvas("miniRight", "idle");

    let t = 0;
    function animateCats() {
      t += 1;
      const blink = (Math.sin(t / 18) > 0.96) ? "blink" : "idle";
      drawCat(leftCat.ctx, t % 120 < 60 ? "point-right" : blink);
      drawCat(rightCat.ctx, t % 120 < 60 ? "point-left" : blink);
      drawCat(miniLeft.ctx, blink);
      drawCat(miniRight.ctx, blink);
      requestAnimationFrame(animateCats);
    }
    animateCats();

    enterBtn.addEventListener("click", () => {
      card.classList.add("fadeOut");
      setTimeout(() => {
        // keep this as your next section trigger
        alert("Ready for the surprise ✨");
      }, 600);
    });

    setInterval(() => {
      enterBtn.animate(
        [{ transform: "translateY(0px)" }, { transform: "translateY(-2px)" }, { transform: "translateY(0px)" }],
        { duration: 900, iterations: 1 }
      );
    }, 3200);
  </script>
</body>
</html>
