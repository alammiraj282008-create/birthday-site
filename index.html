<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nimisha 🎂 Happy Birthday!</title>

<style>
* {
  box-sizing: border-box;
}

body{
  margin:0;
  background: url('https://cdn.pixplet.com/assets/images/artistic-celebration-003.jpg') no-repeat center center fixed;
  background-size: cover;
  color:#e8d5b7;
  font-family:'Segoe UI', 'Poppins', sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
  position:relative;
}

/* Darker overlay for readability */
body::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.85) 100%);
  z-index: 0;
}

.container, #roseScene {
  position: relative;
  z-index: 1;
}

.container{
  text-align:center;
  max-width: 400px;
  background: rgba(10,8,15,0.85);
  backdrop-filter: blur(12px);
  border-radius: 50px;
  border: 1px solid rgba(255,215,0,0.4);
  box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 30px rgba(255,215,0,0.2);
  padding: 30px 25px 35px;
  transition: all 0.3s ease;
}

/* Gold glam text */
h1{
  font-size: 26px;
  background: linear-gradient(135deg, #FFD700, #FFA500, #FFD700);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-shadow: 0 0 20px rgba(255,215,0,0.5);
  letter-spacing: 1px;
  margin-bottom: 15px;
  font-weight: bold;
}

/* Teasing message styling */
.tease-message {
  background: rgba(255,215,0,0.1);
  border-left: 3px solid #FFD700;
  border-right: 3px solid #FFD700;
  padding: 10px 15px;
  margin: 15px 0;
  border-radius: 20px;
  font-size: 14px;
  color: #FFD700;
  font-style: italic;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { opacity: 0.7; }
  100% { opacity: 1; }
}

/* GIF styling */
.gif-container {
  margin: 10px auto;
  text-align: center;
}

.teasing-gif {
  max-width: 120px;
  border-radius: 20px;
  box-shadow: 0 0 15px rgba(255,215,0,0.4);
  border: 2px solid #FFD700;
}

/* Dots display */
#dots{
  font-size: 36px;
  letter-spacing: 12px;
  color: #FFD700;
  text-shadow: 0 0 10px rgba(255,215,0,0.6);
  font-weight: bold;
  background: rgba(0,0,0,0.5);
  display: inline-block;
  padding: 10px 25px;
  border-radius: 50px;
  margin: 15px auto;
  width: fit-content;
  border: 1px solid rgba(255,215,0,0.3);
}

/* Keypad styling */
#keypad {
  margin: 25px 0 15px;
}

.row{
  display:flex;
  justify-content:center;
  gap: 12px;
  margin-bottom: 12px;
}

.row button{
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: linear-gradient(145deg, #1a1a2e, #0f0f1a);
  border: 1.5px solid rgba(255,215,0,0.4);
  color: #FFD700;
  font-size: 26px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 5px 15px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
  transition: all 0.2s ease;
  font-family: monospace;
}

.row button:hover{
  transform: translateY(-2px);
  background: linear-gradient(145deg, #252540, #15152a);
  border-color: rgba(255,215,0,0.8);
  box-shadow: 0 8px 20px rgba(0,0,0,0.5), 0 0 12px rgba(255,215,0,0.4);
}

.row button:active{
  transform: translateY(1px);
}

/* Hint text */
#hint{
  color: rgba(255,215,0,0.7);
  font-size: 13px;
  letter-spacing: 1px;
  font-style: italic;
  margin-top: 20px;
  padding-top: 10px;
  border-top: 1px dashed rgba(255,215,0,0.3);
}

/* Continue button */
button:not(.row button) {
  background: linear-gradient(135deg, #FFD700, #FFA500);
  border: none;
  padding: 12px 30px;
  border-radius: 40px;
  color: #1a1a2e;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
  margin-top: 20px;
  transition: all 0.3s ease;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

button:not(.row button):hover {
  transform: scale(1.05);
  box-shadow: 0 8px 25px rgba(255,215,0,0.4);
  background: linear-gradient(135deg, #FFE44D, #FFB347);
}

/* Gift boxes */
.box{
  display:inline-block;
  width: 90px;
  height: 90px;
  margin: 12px 8px;
  background: linear-gradient(145deg, #1e1e2e, #12121c);
  border: 2px solid #FFD700;
  border-radius: 20px;
  line-height: 90px;
  cursor: pointer;
  font-size: 28px;
  font-weight: bold;
  transition: all 0.3s ease;
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
  color: #FFD700;
}

.box:hover{
  transform: translateY(-8px) scale(1.02);
  border-color: #FFA500;
  box-shadow: 0 15px 30px rgba(255,215,0,0.3);
  background: linear-gradient(145deg, #2a2a3e, #18182a);
}

/* Rose scene */
#roseScene{
  display:none;
  text-align:center;
  background: rgba(10,8,15,0.9);
  backdrop-filter: blur(12px);
  border-radius: 50px;
  border: 1px solid rgba(255,215,0,0.5);
  padding: 30px 25px;
  max-width: 400px;
  margin: auto;
  box-shadow: 0 20px 40px rgba(0,0,0,0.6);
}

#roseScene h1 {
  font-size: 24px;
  margin-bottom: 20px;
}

#bouquet{
  position:relative;
  width: 220px;
  height: 220px;
  margin: 20px auto;
  background: rgba(0,0,0,0.3);
  border-radius: 50%;
  box-shadow: 0 0 30px rgba(255,215,0,0.2);
}

.rose{
  width: 22px;
  height: 22px;
  background: radial-gradient(circle, #7ec8ff, #2e6bb0);
  border-radius: 50% 50% 50% 0;
  transform: rotate(45deg);
  position:absolute;
  animation: grow 0.6s ease forwards;
  box-shadow: 0 0 12px #4da6ff;
}

@keyframes grow{
  from{
    transform: scale(0) rotate(45deg);
    opacity: 0;
  }
  to{
    transform: scale(1) rotate(45deg);
    opacity: 1;
  }
}

#roseText{
  font-size: 17px;
  line-height: 1.8;
  white-space: pre-line;
  margin: 25px;
  color: #e8d5b7;
  background: rgba(0,0,0,0.4);
  padding: 15px;
  border-radius: 30px;
  border-left: 3px solid #FFD700;
}

/* Animations */
@keyframes glow {
  0% { box-shadow: 0 0 5px rgba(255,215,0,0.3); }
  100% { box-shadow: 0 0 20px rgba(255,215,0,0.6); }
}

.container {
  animation: glow 2s infinite alternate;
}

/* Responsive */
@media (max-width: 450px) {
  .row button {
    width: 60px;
    height: 60px;
    font-size: 22px;
  }
  .box {
    width: 75px;
    height: 75px;
    line-height: 75px;
    font-size: 24px;
  }
  .container {
    max-width: 340px;
    padding: 20px 15px;
  }
  .teasing-gif {
    max-width: 90px;
  }
}
</style>
</head>

<body>

<!-- LOCK SCREEN -->
<div id="lockScreen" class="container">

  <h1>✨ ENTER PASSCODE ✨</h1>
  
  <!-- Teasing GIF -->
  <div class="gif-container">
    <img class="teasing-gif" src="https://media1.tenor.com/m/-mGQEeygOlIAAAAC/teasing-tongue.gif" alt="teasing gif">
  </div>
  
  <!-- Teasing hint message -->
  <div class="tease-message">
    😏 I know you're not smart enough to guess the code, Princess... 💅
  </div>
  
  <div id="dots">____</div>

  <div id="keypad">
    <div class="row">
      <button onclick="press(1)">1</button>
      <button onclick="press(2)">2</button>
      <button onclick="press(3)">3</button>
    </div>
    <div class="row">
      <button onclick="press(4)">4</button>
      <button onclick="press(5)">5</button>
      <button onclick="press(6)">6</button>
    </div>
    <div class="row">
      <button onclick="press(7)">7</button>
      <button onclick="press(8)">8</button>
      <button onclick="press(9)">9</button>
    </div>
    <div class="row">
      <button onclick="clearInput()">⌫</button>
      <button onclick="press(0)">0</button>
      <button onclick="clearAll()">C</button>
    </div>
  </div>

  <p id="hint">💫 hint: the day we first talked... 💫</p>
</div>

<!-- MAIN FLOW -->
<div id="app" class="container" style="display:none;">

<h1 id="title">...</h1>
<p id="text">So you actually remember</p>

<button onclick="next()">✦ CONTINUE ✦</button>
<div id="extra"></div>

</div>

<!-- ROSE SCENE -->
<div id="roseScene">
  <h1>💙 NOT EVERYONE GETS THIS 💙</h1>
  <div id="bouquet"></div>
  <p id="roseText"></p>
  <button onclick="back()">◀ BACK</button>
</div>

<script>

/* PASSWORD - Day we first talked */
let inputCode = "";
const correctCode = "19102024"; // October 19, 2024 - the day you two first talked

function press(num) {
  if (inputCode.length >= 8) return;
  inputCode += num;
  updateDots();

  if (inputCode.length === 8) {
    setTimeout(checkCode, 100);
  }
}

function updateDots() {
  let d = "";
  if (inputCode.length === 0) {
    d = "____";
  } else {
    for (let i = 0; i < inputCode.length; i++) d += "● ";
  }
  document.getElementById("dots").innerText = d;
}

function clearInput() {
  inputCode = inputCode.slice(0, -1);
  updateDots();
}

function clearAll() {
  inputCode = "";
  updateDots();
}

function checkCode() {
  if (inputCode === correctCode) {
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("app").style.display = "block";
  } else {
    let lines = [
      "❌ Wrong code, Princess... try again 👸",
      "💔 Not today, smarty pants",
      "🤔 Hmm... maybe you're not as clever as I thought 😏",
      "😅 One more try... or should I just tell you?",
      "🙄 Really? That's your guess? Nope!"
    ];
    document.getElementById("hint").innerHTML = "✨ " + lines[Math.floor(Math.random() * lines.length)] + " ✨";
    inputCode = "";
    updateDots();
  }
}

/* FLOW */
let step = 0;

function next() {
  const flow = [
    ["Wait...", "Let me check who this is... 🕵️"],
    ["Oh wow!", "You actually remembered! 🎉✨"],
    ["Nimisha...", "Still the same amazing person! 💫"],
    ["19 October 2024...", "The day everything changed 💛"],
    ["Anyway...", "I made something special for you! 🎁"]
  ];

  if (step < flow.length) {
    document.getElementById("title").innerHTML = flow[step][0];
    document.getElementById("text").innerText = flow[step][1];
    step++;
    return;
  }

  if (step === flow.length) {
    document.getElementById("title").innerHTML = "🎁 PICK A GIFT 🎁";
    document.getElementById("text").innerText = "Choose a box carefully, Princess...";

    document.getElementById("extra").innerHTML = `
      <div class="box" onclick="pickBox(1)">🎀<br>1</div>
      <div class="box" onclick="pickBox(2)">🎈<br>2</div>
      <div class="box" onclick="pickBox(3)">💝<br>3</div>
    `;
    step++;
  }
}

/* BOX → ROSE */
function pickBox(boxNumber) {
  document.getElementById("app").style.display = "none";
  document.getElementById("roseScene").style.display = "block";

  let b = document.getElementById("bouquet");
  b.innerHTML = "";

  // Create 16 roses in a beautiful circular pattern
  for (let i = 0; i < 16; i++) {
    let r = document.createElement("div");
    r.className = "rose";

    let angle = (i / 16) * Math.PI * 2;
    let radius = 75;
    let center = 110;
    let x = center + Math.cos(angle) * radius;
    let y = center + Math.sin(angle) * radius;

    r.style.left = x + "px";
    r.style.top = y + "px";
    r.style.animationDelay = (i * 0.04) + "s";

    b.appendChild(r);
  }

  let messages = {
    1: "💙 Blue roses.\n\nRare and mysterious.\nJust like you.\n\nSpecial and unique!\n💙",
    2: "🌹 Not red, but blue.\n\nUnique, unforgettable.\nThat's exactly YOU!\n\n✨🌟✨",
    3: "✨ Something magical.\n\nFor someone special.\n\nHAPPY BIRTHDAY NIMISHA!\n\nLove, 💙\n🎂✨"
  };

  typeRose(messages[boxNumber]);
}

function typeRose(message) {
  let i = 0;
  let el = document.getElementById("roseText");
  el.innerHTML = "";

  function t() {
    if (i < message.length) {
      el.innerHTML += message[i++];
      setTimeout(t, 35);
    }
  }
  t();
}

function back() {
  document.getElementById("roseScene").style.display = "none";
  document.getElementById("app").style.display = "block";

  document.getElementById("title").innerHTML = "💭 Hmm...";
  document.getElementById("text").innerHTML = "That was just the beginning...";
  document.getElementById("extra").innerHTML = "";
}

// Initialize
updateDots();

</script>

</body>
</html>
