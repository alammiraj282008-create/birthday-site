<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Don't Click No</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at center, #1a0000, #000000);
    font-family: 'Courier New', monospace;
    color: #ff2b2b;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* Flicker effect */
body::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(255,0,0,0.05);
    animation: flicker 0.15s infinite;
    pointer-events: none;
}

@keyframes flicker {
    0% {opacity: 0.05;}
    50% {opacity: 0.1;}
    100% {opacity: 0.05;}
}

.container {
    text-align: center;
    position: relative;
}

h1 {
    font-size: 28px;
    letter-spacing: 2px;
    text-shadow: 0 0 10px #ff0000;
}

/* Buttons */
button {
    padding: 12px 25px;
    margin: 10px;
    font-size: 18px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
}

#yesBtn {
    background: #111;
    color: #00ff99;
    border: 1px solid #00ff99;
}

#noBtn {
    background: #300000;
    color: #ff4d4d;
    position: absolute;
    border: 1px solid #ff0000;
    box-shadow: 0 0 10px #ff0000;
}

/* Chibi + bubble */
#chibiBox {
    position: absolute;
    top: -240px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
}

#chibiImg {
    width: 160px;
    display: none;
    animation: shake 0.3s;
}

/* Dialogue bubble horror style */
#bubble {
    display: none;
    background: black;
    color: #ff2b2b;
    padding: 10px 15px;
    border-radius: 8px;
    margin-bottom: 10px;
    font-size: 14px;
    border: 1px solid red;
    box-shadow: 0 0 10px red;
    animation: glitch 0.3s;
}

/* Glitch text */
@keyframes glitch {
    0% { transform: translate(0); }
    20% { transform: translate(-2px, 2px); }
    40% { transform: translate(2px, -2px); }
    60% { transform: translate(-1px, 1px); }
    80% { transform: translate(1px, -1px); }
    100% { transform: translate(0); }
}

/* Chibi shake */
@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    50% { transform: translateX(4px); }
    75% { transform: translateX(-2px); }
    100% { transform: translateX(0); }
}
</style>
</head>

<body>

<div class="container">

    <h1>Will you still press NO?</h1>

    <div id="chibiBox">
        <div id="bubble"></div>
        <img id="chibiImg" src="chibi15.png">
    </div>

    <button id="yesBtn">Yes</button>
    <button id="noBtn">No</button>

</div>

<script>
let count = 0;

const noBtn = document.getElementById("noBtn");
const chibi = document.getElementById("chibiImg");
const bubble = document.getElementById("bubble");

const states = [
    { img: "chibi15.png", text: "Don't touch that again." },
    { img: "chibi21.png", text: "You really want to test this?" },
    { img: "chibi23.png", text: "I told you not to." },
    { img: "chibi49.png", text: "Still going? Interesting." },
    { img: "chibi20.png", text: "You won't catch it." }
];

noBtn.addEventListener("click", () => {
    count++;

    let s = states[Math.min(count - 1, states.length - 1)];

    chibi.src = s.img;
    chibi.style.display = "block";

    bubble.innerText = s.text;
    bubble.style.display = "block";

    moveButton();
});

function moveButton() {
    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 60);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}
</script>

</body>
</html>
