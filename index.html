<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nimisha 🎂</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

.container{
  text-align:center;
  max-width:350px;
}

h1{
  color:#ff2e63;
  text-shadow:0 0 15px #ff2e63;
}

button{
  margin:10px;
  padding:10px 20px;
  background:#ff2e63;
  border:none;
  border-radius:20px;
  color:white;
  cursor:pointer;
}

/* keypad */
.row{
  display:flex;
  justify-content:center;
}
.row button{
  width:60px;
  height:60px;
  margin:5px;
  border-radius:50%;
  background:#222;
  box-shadow:0 0 10px #ff2e63;
}

/* boxes */
.box{
  display:inline-block;
  width:80px;
  height:80px;
  margin:10px;
  background:#222;
  border:2px solid #ff2e63;
  border-radius:10px;
  line-height:80px;
  cursor:pointer;
}

/* roses */
#roseScene{
  display:none;
  text-align:center;
}

#bouquet{
  position:relative;
  width:200px;
  height:200px;
  margin:20px auto;
}

.rose{
  width:20px;
  height:20px;
  background:#4da6ff;
  border-radius:50%;
  position:absolute;
  animation:grow 1s ease forwards;
  box-shadow:0 0 10px #4da6ff;
}

@keyframes grow{
  from{transform:scale(0);}
  to{transform:scale(1);}
}
</style>
</head>

<body>

<!-- LOCK SCREEN -->
<div id="lockScreen" class="container">

  <h1>Enter passcode</h1>
  <div id="dots" style="font-size:30px; letter-spacing:10px;">____</div>

  <div id="keypad">
    <div class="row">
      <button onclick="press(1)">1</button>
      <button onclick="press(2)">2</button>
      <button onclick="press(3)">3</button>
    </div>
    <div class="row">
      <button onclick="press(4)">4</button>
      <button onclick="press(5)">5</button>
      <button onclick="press(6)">6</button>
    </div>
    <div class="row">
      <button onclick="press(7)">7</button>
      <button onclick="press(8)">8</button>
      <button onclick="press(9)">9</button>
    </div>
    <div class="row">
      <button onclick="clearInput()">⌫</button>
      <button onclick="press(0)">0</button>
      <button onclick="clearAll()">C</button>
    </div>
  </div>

  <p id="hint" style="color:gray;">hint: think properly</p>
</div>

<!-- MAIN FLOW -->
<div id="app" class="container" style="display:none;">

<h1 id="title">...</h1>
<p id="text">So you actually remember</p>

<button onclick="next()">Continue</button>
<div id="extra"></div>

</div>

<!-- ROSE SCENE -->
<div id="roseScene">
  <h1 style="color:#4da6ff;">Not everyone gets this</h1>
  <div id="bouquet"></div>
  <p id="roseText"></p>
  <button onclick="back()">Continue</button>
</div>

<script>

/* PASSWORD */
let inputCode="";
const correctCode="19102024";

function press(num){
  if(inputCode.length>=8) return;
  inputCode+=num;
  updateDots();

  if(inputCode.length===8){
    checkCode();
  }
}

function updateDots(){
  let d="";
  for(let i=0;i<inputCode.length;i++) d+="● ";
  document.getElementById("dots").innerText=d;
}

function clearInput(){
  inputCode=inputCode.slice(0,-1);
  updateDots();
}

function clearAll(){
  inputCode="";
  updateDots();
}

function checkCode(){
  if(inputCode===correctCode){
    document.getElementById("lockScreen").style.display="none";
    document.getElementById("app").style.display="block";
  } else {
    let lines=[
      "Wrong.",
      "Try again.",
      "You forgot?",
      "That’s bad"
    ];
    document.getElementById("hint").innerText =
      lines[Math.floor(Math.random()*lines.length)];
    inputCode="";
    updateDots();
  }
}

/* FLOW */
let step=0;

function next(){

  const flow=[
    ["Wait","Let me check"],
    ["Oh","It is you"],
    ["Nimisha","Still the same"],
    ["19?","That’s crazy"],
    ["Anyway","I made something for you"]
  ];

  if(step < flow.length){
    document.getElementById("title").innerText=flow[step][0];
    document.getElementById("text").innerText=flow[step][1];
    step++;
    return;
  }

  /* BOX STEP */
  if(step===flow.length){
    document.getElementById("title").innerText="Pick one";
    document.getElementById("text").innerText="Choose a box";

    document.getElementById("extra").innerHTML=`
      <div class="box" onclick="pickBox()">1</div>
      <div class="box" onclick="pickBox()">2</div>
      <div class="box" onclick="pickBox()">3</div>
    `;
    step++;
  }
}

/* BOX → ROSE */
function pickBox(){
  document.getElementById("app").style.display="none";
  document.getElementById("roseScene").style.display="block";

  let b=document.getElementById("bouquet");
  b.innerHTML="";

  for(let i=0;i<15;i++){
    let r=document.createElement("div");
    r.className="rose";

    r.style.left=80+Math.cos(i)*60+"px";
    r.style.top=80+Math.sin(i)*60+"px";

    b.appendChild(r);
  }

  typeRose();
}

function typeRose(){
  let text="Blue roses.\nNot common.\nJust like you.\nDon’t overthink it.";
  let i=0;
  let el=document.getElementById("roseText");
  el.innerHTML="";

  function t(){
    if(i<text.length){
      el.innerHTML+=text[i++];
      setTimeout(t,30);
    }
  }
  t();
}

function back(){
  document.getElementById("roseScene").style.display="none";
  document.getElementById("app").style.display="block";

  document.getElementById("title").innerText="Hmm";
  document.getElementById("text").innerText="That was one of them";
  document.getElementById("extra").innerHTML="";
}

</script>

</body>
</html>
