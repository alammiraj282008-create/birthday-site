<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nimisha 🎂</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #1a0010, #000);
  color: white;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* screens */
.screen {
  display: none;
  text-align: center;
  max-width: 360px;
  animation: fade 0.5s ease;
}
.active { display: block; }

/* neon text */
h1 {
  color: #ff2e63;
  text-shadow: 0 0 15px #ff2e63;
}

/* input */
input {
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}

/* buttons */
button {
  margin: 10px;
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  background: #ff2e63;
  color: white;
  cursor: pointer;
  box-shadow: 0 0 10px #ff2e63;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

/* animations */
@keyframes fade {
  from {opacity:0; transform: scale(0.95);}
  to {opacity:1; transform: scale(1);}
}

.shake {
  animation: shake 0.3s;
}

@keyframes shake {
  0% {transform: translateX(0);}
  50% {transform: translateX(6px);}
  100% {transform: translateX(0);}
}

/* floating emoji */
.emoji {
  font-size: 50px;
  margin-top: 20px;
  animation: float 2.5s infinite ease-in-out;
}

@keyframes float {
  0%,100% {transform: translateY(0);}
  50% {transform: translateY(-10px);}
}
</style>
</head>

<body>

<!-- SCREEN 1: PASSWORD -->
<div id="screen1" class="screen active">
  <h1>Access Required 🔐</h1>
  <p>Enter the date we first met 👀</p>
  <input type="text" id="dateInput" placeholder="DDMMYYYY">
  <br>
  <button onclick="checkDate()">Unlock</button>
  <p id="errorText"></p>

  <div class="emoji">😼</div>
</div>

<!-- SCREEN 2: CHOICE -->
<div id="screen2" class="screen">
  <h1>Happy birthday my kitty 🐱</h1>

  <p>
    Look who is getting older 😏<br><br>
    My kitty is 19 now.<br><br>
    I prepared 19 special things just for you…<br><br>
    Wanna see?
  </p>

  <p style="font-size:12px;color:#aaa;">(try clicking NO first 😈)</p>

  <div class="emoji">😏</div>

  <br>
  <button onclick="yesClicked()">Yes</button>
  <button id="noBtn" onclick="noClicked()">No</button>
</div>

<!-- SCREEN 3: ENTRY -->
<div id="screen3" class="screen">
  <h1>Hmm 😌</h1>
  <p id="entryText"></p>

  <div class="emoji">😂</div>
</div>

<script>
const correctDate = "19102024";
let noCount = 0;

/* screen switch */
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* typing effect */
function typeText(el, text, speed=35) {
  let i = 0;
  el.innerHTML = "";
  function t() {
    if (i < text.length) {
      el.innerHTML += text.charAt(i);
      i++;
      setTimeout(t, speed);
    }
  }
  t();
}

/* DATE CHECK */
function checkDate() {
  const input = document.getElementById("dateInput");
  const error = document.getElementById("errorText");

  if (input.value === correctDate) {
    showScreen("screen2");
  } else {
    const roasts = [
      "You don’t even know? 😭",
      "Wow Nimisha… that’s bad 💀",
      "Fake memory detected 🚫",
      "Try properly 😒",
      "I expected better 😏"
    ];

    error.innerText = roasts[Math.floor(Math.random() * roasts.length)];
    input.classList.add("shake");
    setTimeout(() => input.classList.remove("shake"), 300);
  }
}

/* NO BUTTON CHAOS */
function noClicked() {
  const btn = document.getElementById("noBtn");

  const lines = [
    "Oh attitude huh 😏",
    "You really pressed NO? 💀",
    "Wrong option 😂",
    "This button isn’t for you",
    "Pick YES."
  ];

  alert(lines[noCount % lines.length]);
  noCount++;

  btn.style.position = "absolute";
  btn.style.top = Math.random() * 80 + "%";
  btn.style.left = Math.random() * 80 + "%";
}

/* also dodge on hover */
document.getElementById("noBtn").addEventListener("mouseover", () => {
  const btn = document.getElementById("noBtn");
  btn.style.position = "absolute";
  btn.style.top = Math.random() * 80 + "%";
  btn.style.left = Math.random() * 80 + "%";
});

/* YES CLICK */
function yesClicked() {
  showScreen("screen3");

  typeText(
    document.getElementById("entryText"),
    "Looks like you couldn’t wait 😌\n\nWell… I couldn’t wait for your reaction either.\n\nLet’s begin..."
  );
}
</script>

</body>
</html>
